<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Treino Simone">
  <meta name="theme-color" content="#667EEA">
  <meta name="description" content="App de treino personalizado para Simone Trombini">

  <title>Treino da Simone</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/icon-192.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Inter', 'sans-serif'],
            body: ['Nunito', 'sans-serif'],
          },
          colors: {
            bg: '#F7F8FC',
            card: '#FFFFFF',
            txt: '#2D3436',
            'txt-sec': '#636E72',
          },
          borderRadius: {
            '3xl': '24px',
          }
        }
      }
    }
  </script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="font-body bg-bg text-txt antialiased">

  <!-- ════════════════════════════════════ -->
  <!-- TAB CONTENT AREA -->
  <!-- ════════════════════════════════════ -->
  <main id="app-main" class="pb-24 min-h-screen">
    <!-- Tab: Home -->
    <section id="tab-home" class="tab-panel active px-5 pt-safe">
      <div id="home-content"></div>
    </section>

    <!-- Tab: Treino -->
    <section id="tab-workout" class="tab-panel px-5 pt-safe">
      <div id="workout-content"></div>
    </section>

    <!-- Tab: Saude -->
    <section id="tab-health" class="tab-panel px-5 pt-safe">
      <div id="health-content"></div>
    </section>

    <!-- Tab: Progresso -->
    <section id="tab-progress" class="tab-panel px-5 pt-safe">
      <div id="progress-content"></div>
    </section>

    <!-- Tab: Config -->
    <section id="tab-settings" class="tab-panel px-5 pt-safe">
      <div id="settings-content"></div>
    </section>
  </main>

  <!-- ════════════════════════════════════ -->
  <!-- CELEBRATION OVERLAY -->
  <!-- ════════════════════════════════════ -->
  <div id="celebration-overlay" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    <div class="relative z-10 flex items-center justify-center min-h-screen p-6">
      <div id="celebration-card" class="bg-white rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl transform scale-90 opacity-0 transition-all duration-500">
        <!-- Filled by JS -->
      </div>
    </div>
    <div id="confetti-container" class="fixed inset-0 pointer-events-none z-20"></div>
  </div>

  <!-- ════════════════════════════════════ -->
  <!-- BOTTOM TAB BAR -->
  <!-- ════════════════════════════════════ -->
  <nav id="tab-bar" class="fixed bottom-0 left-0 right-0 z-40 bg-white/95 backdrop-blur-lg shadow-[0_-4px_24px_rgba(0,0,0,0.06)] pb-safe">
    <div class="flex justify-around items-center h-16 max-w-lg mx-auto">
      <button class="tab-btn active" data-tab="home">
        <svg class="w-6 h-6 mx-auto mb-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
        <span class="text-[10px] font-semibold">Inicio</span>
      </button>
      <button class="tab-btn" data-tab="workout">
        <svg class="w-6 h-6 mx-auto mb-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h4v12H4zM16 6h4v12h-4zM8 10h8v4H8z"/></svg>
        <span class="text-[10px] font-semibold">Treino</span>
      </button>
      <button class="tab-btn" data-tab="health">
        <svg class="w-6 h-6 mx-auto mb-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
        <span class="text-[10px] font-semibold">Saude</span>
      </button>
      <button class="tab-btn" data-tab="progress">
        <svg class="w-6 h-6 mx-auto mb-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6m6 0h6m-6 0V9a2 2 0 012-2h2a2 2 0 012 2v10m6 0v-4a2 2 0 00-2-2h-2a2 2 0 00-2 2v4"/></svg>
        <span class="text-[10px] font-semibold">Progresso</span>
      </button>
      <button class="tab-btn" data-tab="settings">
        <svg class="w-6 h-6 mx-auto mb-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
        <span class="text-[10px] font-semibold">Config</span>
      </button>
    </div>
  </nav>

  <!-- Scripts -->
  <script src="exercises.js"></script>
  <script src="app.js"></script>
</body>
</html>
