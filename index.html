<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Treino Simone">
  <meta name="theme-color" content="#E88D67">
  <meta name="description" content="App de treino personalizado para Simone Trombini">

  <title>Treino da Simone</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/icon-192.png">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════════════════════════════════ -->
  <!-- INSTALL BANNER -->
  <!-- ═══════════════════════════════════ -->
  <div class="install-banner" id="install-banner">
    <p><strong>📲 Instale o app!</strong><br>Adicione à tela inicial para acessar offline.</p>
    <button class="btn btn-sm" style="background:#fff; color:var(--primary); font-weight:700;" onclick="installApp()">Instalar</button>
  </div>

  <!-- ═══════════════════════════════════ -->
  <!-- TAB: HOME -->
  <!-- ═══════════════════════════════════ -->
  <div id="tab-home" class="tab-content active">
    <div class="container" id="home-content">
      <!-- Rendered by app.js -->
    </div>
  </div>

  <!-- ═══════════════════════════════════ -->
  <!-- TAB: WORKOUT -->
  <!-- ═══════════════════════════════════ -->
  <div id="tab-workout" class="tab-content">
    <div class="container" id="workout-content">
      <!-- Rendered by app.js -->
    </div>
  </div>

  <!-- ═══════════════════════════════════ -->
  <!-- TAB: HEALTH -->
  <!-- ═══════════════════════════════════ -->
  <div id="tab-health" class="tab-content">
    <div class="container" id="health-content">
      <!-- Rendered by app.js -->
    </div>
  </div>

  <!-- ═══════════════════════════════════ -->
  <!-- TAB: PROGRESS -->
  <!-- ═══════════════════════════════════ -->
  <div id="tab-progress" class="tab-content">
    <div class="container" id="progress-content">
      <!-- Rendered by app.js -->
    </div>
  </div>

  <!-- ═══════════════════════════════════ -->
  <!-- TAB: SETTINGS -->
  <!-- ═══════════════════════════════════ -->
  <div id="tab-settings" class="tab-content">
    <div class="container" id="settings-content">
      <!-- Rendered by app.js -->
    </div>
  </div>

  <!-- ═══════════════════════════════════ -->
  <!-- POST-WORKOUT OVERLAY -->
  <!-- ═══════════════════════════════════ -->
  <div class="post-workout-overlay" id="post-workout-overlay">
    <div class="post-workout-card">
      <div class="congrats-icon">🎉</div>
      <h2>Parabéns Simone!<br>Treino completo!</h2>
      <p style="color:var(--text-light); margin-bottom:24px;">Você é incrível! Cada treino conta.</p>

      <!-- Pain Diary -->
      <div class="pain-section">
        <h3>Sentiu dor durante o treino?</h3>
        <p style="font-size:0.85rem; color:var(--text-light); margin-bottom:8px;">Selecione as regiões (se houver):</p>
        <div class="body-parts">
          <button class="body-part-btn" onclick="selectBodyPart(this)">🦴 Pescoço</button>
          <button class="body-part-btn" onclick="selectBodyPart(this)">💪 Ombro</button>
          <button class="body-part-btn" onclick="selectBodyPart(this)">🦵 Joelho Dir.</button>
          <button class="body-part-btn" onclick="selectBodyPart(this)">🔙 Lombar</button>
          <button class="body-part-btn" onclick="selectBodyPart(this)">📍 Outro</button>
        </div>

        <h3>Nível da dor</h3>
        <div class="pain-level">
          <button class="pain-level-btn" onclick="selectPainLevel(this, 1)">1</button>
          <button class="pain-level-btn" onclick="selectPainLevel(this, 2)">2</button>
          <button class="pain-level-btn" onclick="selectPainLevel(this, 3)">3</button>
          <button class="pain-level-btn" onclick="selectPainLevel(this, 4)">4</button>
          <button class="pain-level-btn" onclick="selectPainLevel(this, 5)">5</button>
        </div>

        <h3>Como você está se sentindo?</h3>
        <div class="mood-selector">
          <button class="mood-btn post-mood-btn" onclick="selectPostMood(this, 'happy')">😊</button>
          <button class="mood-btn post-mood-btn" onclick="selectPostMood(this, 'neutral')">😐</button>
          <button class="mood-btn post-mood-btn" onclick="selectPostMood(this, 'sad')">😔</button>
        </div>

        <div class="input-group">
          <label>Observações</label>
          <textarea class="input-field" id="pain-notes" placeholder="Algo que queira anotar..."></textarea>
        </div>

        <button class="btn btn-primary btn-block" onclick="savePainDiary()" style="margin-top:8px">
          ✓ Salvar e Fechar
        </button>
        <button class="btn btn-outline btn-block" onclick="closePostWorkout()" style="margin-top:8px">
          Pular
        </button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════ -->
  <!-- BOTTOM TAB NAVIGATION -->
  <!-- ═══════════════════════════════════ -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="home">
      <span class="tab-icon">🏠</span>
      <span>Início</span>
    </button>
    <button class="tab-btn" data-tab="workout">
      <span class="tab-icon">🏋️</span>
      <span>Treino</span>
    </button>
    <button class="tab-btn" data-tab="health">
      <span class="tab-icon">❤️</span>
      <span>Saúde</span>
    </button>
    <button class="tab-btn" data-tab="progress">
      <span class="tab-icon">📊</span>
      <span>Progresso</span>
    </button>
    <button class="tab-btn" data-tab="settings">
      <span class="tab-icon">⚙️</span>
      <span>Config</span>
    </button>
  </nav>

  <!-- Scripts -->
  <script src="exercises.js"></script>
  <script src="app.js"></script>

</body>
</html>
